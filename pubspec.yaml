name: baimai_music
description: BaiMai Music - Modern privacy-focused music streaming app by The BaiMai Open Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # Estado y Reactividad
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # Reproducción de Audio Core
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # Proveedores y Descompresión Multimedia
  youtube_explode_dart: ^2.3.0
  http: ^1.2.0

  # Base de datos local (Migrado a Hive CE estable)
  hive_ce: ^1.2.0
  hive_ce_flutter: ^1.2.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # UI, Animaciones y Fuentes
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.0
  shimmer: ^3.1.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  intl: ^0.19.0

  # Utilidades del Sistema y Plugins de Plataforma
  url_launcher: ^6.3.0
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  connectivity_plus: ^6.0.0
  permission_handler: ^11.3.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  hive_ce_generator: ^1.2.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
